<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登陆注册 - 故宫博物馆</title>
    <link rel="stylesheet" href="../css/register.css">
    <link rel="stylesheet" href="../css/frame.css">
    <script src="../js/register.js"></script>
</head>
<body>
    <!-- 头部 -->
    <header>
        <div class="top-icon">
            <img src="../image/img001.png">
            <h1>故宫博物馆</h1>
        </div>
        <nav>
            <div class="top-nav">
                <ul>
                    <li><a href="../index.html">首页</a></li>
                        <li><a href="./tour.html">游览</a></li>
                        <li><a href="./exhibition.html">展览</a></li>
                        <li><a href="./cultural.html">文创</a></li>
                        <li><a href="./book.html">订票</a></li>
                        <li><a href="./register.html">登录</a></li>
                        <div class="nav-box"></div>
                </ul>
            </div>
        </nav>
    </header>
    <div class="container0">
    <div class="container1">
    <div class="container" id="container">
        <div class="form-container sign-up-container">
            <!-- 注册 -->
            <form action="#" id="signupForm">
                <h1>用户注册</h1>
                <input type="text" id="signupUsername" placeholder="用户名">
                <input type="password" id="signupPassword" placeholder="密码">
                <input type="password" id="confirmPassword" placeholder="确认密码">
                <button type="submit">注册</button>
            </form>
        </div>
        <div class="form-container sing-in-container">
            <!-- 登陆 -->
            <form action="#" id="signInForm">
                <h1>用户登陆</h1>
                <input type="text" id="signInUsername" placeholder="用户名">
                <input type="password" id="signInPassword" placeholder="密码">
                <a href="#">忘记密码?</a>
                <button type="submit">登陆</button>
            </form>
        </div>
        <!-- 侧边栏内容 -->
        <div class="overlay-container">
            <div class="overlay">
                <div class="overlay-pannel overlay-left">
                    <h1>已有账号?</h1>
                    <p>推开一扇门 两朝三世六百年</p>
                    <button class="ghost" id="signIn">登陆</button>
                </div>
                <div class="overlay-pannel overlay-right">
                    <h1>没有帐号？</h1>
                    <p>我从远方来 赴你一面之约</p>
                    <button class="ghost" id="signUp">注册</button>
                </div>
            </div>
        </div>
    </div>
</div>
    </div>

    <!-- 页脚 -->
    <footer>
        <p>© 2024 故宫博物馆</p>
    </footer>
</body>

</html>
